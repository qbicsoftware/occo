name: US-013 Installer Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: us-013-installer-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-tests-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck (syntax only)
        run: |
          sh -n scripts/opencode-helper-install
          sh -n scripts/test-opencode-helper-install

      - name: Run installer tests
        run: sh scripts/test-opencode-helper-install

  installer-tests-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck (syntax only)
        run: |
          sh -n scripts/opencode-helper-install
          sh -n scripts/test-opencode-helper-install

      - name: Run installer tests
        run: sh scripts/test-opencode-helper-install
