name: Release opencode-helper

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-opencode-helper-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release bundle artifacts
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p release-assets
          BUNDLE_OUTPUT=$(sh scripts/release/build-opencode-helper-bundle.sh \
            --tag "${TAG}" \
            --commit-sha "${GITHUB_SHA}" \
            --output-dir release-assets)
          echo "BUNDLE_TARBALL=$(echo "$BUNDLE_OUTPUT" | sed -n '1p')" >> "$GITHUB_ENV"
          echo "BUNDLE_MANIFEST=$(echo "$BUNDLE_OUTPUT" | sed -n '2p')" >> "$GITHUB_ENV"
          echo "BUNDLE_CHECKSUMS=$(echo "$BUNDLE_OUTPUT" | sed -n '3p')" >> "$GITHUB_ENV"
          echo "BUNDLE_INSTALLER=$(echo "$BUNDLE_OUTPUT" | sed -n '4p')" >> "$GITHUB_ENV"
          echo "BUNDLE_BOOTSTRAP=$(echo "$BUNDLE_OUTPUT" | sed -n '5p')" >> "$GITHUB_ENV"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
        run: |
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            BODY_FILE=$(mktemp)
            printf '%s' "$BODY" > "$BODY_FILE"
            gh release edit "${TAG}" --notes-file "$BODY_FILE"
          fi
          gh release upload "${TAG}" \
            "${{ env.BUNDLE_TARBALL }}" \
            "${{ env.BUNDLE_MANIFEST }}" \
            "${{ env.BUNDLE_CHECKSUMS }}" \
            "${{ env.BUNDLE_INSTALLER }}" \
            "${{ env.BUNDLE_BOOTSTRAP }}" \
            --clobber
